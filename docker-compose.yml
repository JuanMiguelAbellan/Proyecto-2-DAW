services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin.123456
      POSTGRES_DB: IADocs
    ports:
      - "5432:5432"
    volumes:
      - ./BBDD/estructuraBBDD.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./BBDD/datosPrueba.sql:/docker-entrypoint-initdb.d/02_datos.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      OLLAMA_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
